<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--color-bg-page);padding:16px;font-size:11px;color:var(--raiz-ink-soft);}
  .row{display:flex;align-items:flex-end;gap:10px;}
  .bar{background:var(--raiz-forest);width:24px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:4px;}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:var(--space-2)"></div>8</div>
    <div class="item"><div class="bar" style="height:var(--space-4)"></div>16</div>
    <div class="item"><div class="bar" style="height:var(--space-6)"></div>24</div>
    <div class="item"><div class="bar" style="height:var(--space-8)"></div>32</div>
    <div class="item"><div class="bar" style="height:var(--space-10)"></div>48</div>
    <div class="item"><div class="bar" style="height:var(--space-14)"></div>88</div>
  </div>
</body></html>
