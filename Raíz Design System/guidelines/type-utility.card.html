<!-- @dsCard group="Type" viewport="700x180" name="Utility: Inter" subtitle="Kickers, dates, tags — clean sans, no typewriter face" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--color-bg-page);padding:20px;color:var(--raiz-forest);}
.eb{display:block;font-family:var(--font-utility);font-weight:600;font-size:0.78rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--raiz-gold);margin-bottom:14px;}
.tag{display:inline-block;font-family:var(--font-utility);font-weight:600;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--raiz-green-stamp);background:var(--raiz-forest-pale);padding:5px 14px;border-radius:999px;}
.date{font-family:var(--font-utility);font-weight:500;font-size:0.75rem;color:var(--raiz-gold);letter-spacing:0.05em;}
</style></head>
<body>
  <span class="eb">Asesoría migratoria · Vigo, Galicia</span>
  <span class="tag">Aprobado</span>
  <div style="margin-top:14px" class="date">07 JUL 2026</div>
</body></html>
