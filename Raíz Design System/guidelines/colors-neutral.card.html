<!-- @dsCard group="Colors" viewport="700x160" name="Neutrals & Paper" subtitle="Aged-paper background system, no pure white/black" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#fff;padding:16px;}
  .row{display:flex;gap:12px;}
  .sw{flex:1;height:96px;border-radius:8px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;font-size:12px;font-weight:600;border:1px solid var(--raiz-rule);}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--raiz-paper);color:var(--raiz-ink)">Paper #F1EBD8</div>
    <div class="sw" style="background:var(--raiz-paper-card);color:var(--raiz-ink)">Paper Card #FBF8EF</div>
    <div class="sw" style="background:var(--raiz-ink);color:#fff">Ink #211B14</div>
    <div class="sw" style="background:var(--raiz-ink-soft);color:#fff">Ink Soft #4A4032</div>
    <div class="sw" style="background:var(--raiz-rule);color:var(--raiz-ink)">Rule #C7B78E</div>
  </div>
</body></html>
