<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--color-bg-page);padding:16px;}
  .row{display:flex;gap:12px;}
  .sw{flex:1;height:96px;border-radius:8px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;color:#fff;font-size:12px;font-weight:600;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--raiz-forest)">Forest #1C3B30</div>
    <div class="sw" style="background:var(--raiz-forest-light)">Forest Light #2F5C4C</div>
    <div class="sw" style="background:var(--raiz-gold)">Gold #B8874B</div>
    <div class="sw" style="background:var(--raiz-gold-light);color:var(--raiz-ink)">Gold Light #D9AE72</div>
  </div>
</body></html>
